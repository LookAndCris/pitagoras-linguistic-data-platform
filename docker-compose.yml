services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pitagoras
      POSTGRES_USER: pitagoras
      POSTGRES_PASSWORD: pitagoras
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitagoras -d pitagoras"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      PITAGORAS_DATABASE_URL: postgresql+psycopg://pitagoras:pitagoras@db:5432/pitagoras
    command: poetry run uvicorn apps.backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
