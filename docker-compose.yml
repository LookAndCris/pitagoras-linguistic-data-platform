services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      PITAGORAS_DB_HOST: ${PITAGORAS_DB_HOST}
      PITAGORAS_DB_PORT: ${PITAGORAS_DB_PORT}
      PITAGORAS_DB_NAME: ${PITAGORAS_DB_NAME}
      PITAGORAS_DB_USER: ${PITAGORAS_DB_USER}
      PITAGORAS_DB_PASSWORD: ${PITAGORAS_DB_PASSWORD}
      PITAGORAS_DB_SSLMODE: ${PITAGORAS_DB_SSLMODE:-require}
      PITAGORAS_DB_POOL_SIZE: ${PITAGORAS_DB_POOL_SIZE:-5}
      PITAGORAS_DB_MAX_OVERFLOW: ${PITAGORAS_DB_MAX_OVERFLOW:-10}
      PITAGORAS_DB_POOL_RECYCLE_SECONDS: ${PITAGORAS_DB_POOL_RECYCLE_SECONDS:-1800}
    ports:
      - "8000:8000"
